; Hushfall playtest dials.
; Edit values here, restart the game — no code changes needed.
; Every value has a matching default in scripts/game_config.gd.

[lobby]

max_players=12

[player]

move_speed=5.0
mouse_sensitivity=0.002

[voice]

; Beyond this many meters a voice is fully silent.
voice_max_distance=25.0
; Falloff curve: higher = voices carry farther before getting quiet.
voice_unit_size=6.0
; Mic mode: "push_to_talk" (hold V), "toggle" (tap V on/off),
; or "open" (always on while in a lobby).
voice_mode="toggle"

[map]

; Walk-time tier targets in seconds (one-way, bonfire -> site door, at
; walk speed). The boot map audit checks every route against these.
walk_tier_near_max_s=9.0
walk_tier_mid_max_s=14.0
walk_tier_far_max_s=22.0
; No one-way trip may exceed this (the Lighthouse causeway rides closest).
walk_trip_ceiling_s=25.0

[lanterns]

; Chokepoint lantern positions "x,y,z|x,y,z|..." — consumed by the night/
; lantern milestone and by the map audit (R3 nook-danger report).
; Order: kiosk corner, market north gate, causeway mouth.
choke_positions="33,0,-1|41,0,-33|64,0.3,46"

[debug]

; Print the full map flow audit (routes, separations, landmark raycasts)
; in the Output panel when the world loads.
map_audit=true
