; Hushfall playtest dials.
; Edit values here, restart the game — no code changes needed.
; Every value has a matching default in scripts/game_config.gd.

[lobby]

max_players=12

[player]

move_speed=5.0
mouse_sensitivity=0.002

[voice]

; Beyond this many meters a voice is fully silent.
voice_max_distance=25.0
; Falloff curve: higher = voices carry farther before getting quiet.
voice_unit_size=6.0
; Mic mode: "push_to_talk" (hold V), "toggle" (tap V on/off),
; or "open" (always on while in a lobby).
voice_mode="toggle"
